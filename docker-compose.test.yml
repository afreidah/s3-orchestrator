# -------------------------------------------------------------------------------
# Integration Test Services - Docker Compose
#
# Author: Alex Freidah
#
# Provides MinIO (x2) and PostgreSQL containers for integration testing. The
# minio-setup service creates test buckets after both MinIO instances are healthy.
# Usage: docker compose -f docker-compose.test.yml up -d --wait
# -------------------------------------------------------------------------------

services:
  minio-1:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "19000:9000"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 5s
      retries: 5

  minio-2:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "19002:9000"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: s3proxy_test
      POSTGRES_USER: s3proxy
      POSTGRES_PASSWORD: s3proxy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U s3proxy -d s3proxy_test"]
      interval: 2s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc
    depends_on:
      minio-1:
        condition: service_healthy
      minio-2:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set minio1 http://minio-1:9000 minioadmin minioadmin &&
        mc alias set minio2 http://minio-2:9000 minioadmin minioadmin &&
        mc mb --ignore-existing minio1/backend1 &&
        mc mb --ignore-existing minio2/backend2

  prometheus:
    image: prom/prometheus:latest
    network_mode: host
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.listen-address=:19090"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      minio-setup:
        condition: service_completed_successfully

  grafana:
    image: grafana/grafana:latest
    ports:
      - "13000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/s3-orchestrator.json:/var/lib/grafana/dashboards/s3-orchestrator.json:ro
    depends_on:
      - prometheus
