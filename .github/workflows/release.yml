# -------------------------------------------------------------------------------
# Release Workflow - GitHub Actions
#
# Author: Alex Freidah
#
# Triggers on version tag pushes (v*). Runs GoReleaser to produce GitHub Release
# artifacts including binaries, Debian packages, and checksums.
# -------------------------------------------------------------------------------

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify sqlc generated code
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0
          sqlc diff

      - name: Lint
        run: make lint

      - name: Unit tests
        run: go test -race ./...

  release:
    runs-on: ubuntu-latest
    needs: [preflight]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Prep changelog
        run: make prep-changelog

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
