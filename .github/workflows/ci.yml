# -------------------------------------------------------------------------------
# CI Workflow - GitHub Actions
#
# Author: Alex Freidah
#
# Runs on push to main and pull requests. A path-detection job determines which
# file categories changed (Go, web/docs, packaging) and downstream jobs use
# those outputs to skip irrelevant work — e.g. a docs-only PR skips all Go
# testing. On push to main, Docker image builds run for the categories that
# changed.
# -------------------------------------------------------------------------------

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # PATH DETECTION
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      go: ${{ steps.filter.outputs.go }}
      web: ${{ steps.filter.outputs.web }}
      packaging: ${{ steps.filter.outputs.packaging }}
    steps:
      - uses: actions/checkout@v6

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'sqlc.yaml'
              - 'internal/store/sqlc/queries/**'
              - 'Makefile'
              - '.golangci.yml'
            web:
              - 'web/**'
              - 'docs/**'
              - 'README.md'
            packaging:
              - 'nfpm.yaml'
              - 'packaging/**'
              - '.goreleaser.yaml'

  # ---------------------------------------------------------------------------
  # GO CHECKS
  # ---------------------------------------------------------------------------
  version-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for Go/SQL changes
        id: changes
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qE '\.(go|sql)$|sqlc\.yaml$'; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify version bump
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          BASE_VERSION=$(git show origin/${{ github.base_ref }}:.version)
          PR_VERSION=$(cat .version)
          if [ "$BASE_VERSION" = "$PR_VERSION" ]; then
            echo "::error::.version must be incremented when Go or SQL files change (current: $PR_VERSION)"
            exit 1
          fi
          echo "Version bumped: $BASE_VERSION → $PR_VERSION"

  lint:
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify sqlc generated code
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0
          sqlc diff

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1

  test:
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Unit tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic -coverpkg=./... ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}

  govulncheck:
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        run: govulncheck ./...

  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test]
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Fuzz smoke test (parallel)
        run: |
          go test -fuzz=FuzzParseSigV4Fields -fuzztime=10s ./internal/transport/auth/ &
          go test -fuzz=FuzzBuildCanonicalRequest -fuzztime=10s ./internal/transport/auth/ &
          go test -fuzz=FuzzParsePath -fuzztime=10s ./internal/transport/s3api/ &
          go test -fuzz=FuzzDeleteObjectsXML -fuzztime=10s ./internal/transport/s3api/ &
          go test -fuzz=FuzzCompleteMultipartXML -fuzztime=10s ./internal/transport/s3api/ &
          go test -fuzz=FuzzIsValidRequestID -fuzztime=10s ./internal/transport/s3api/ &
          go test -fuzz=FuzzLoginThrottle_RemoteAddr -fuzztime=10s ./internal/transport/s3api/ &
          go test -fuzz=FuzzExtractClientIP -fuzztime=10s ./internal/transport/s3api/ &
          go test -fuzz=FuzzValidMetadataToken -fuzztime=10s ./internal/transport/s3api/ &
          go test -fuzz=FuzzParseHeader -fuzztime=10s ./internal/encryption/ &
          go test -fuzz=FuzzCiphertextRange -fuzztime=10s ./internal/encryption/ &
          go test -fuzz=FuzzUnpackKeyData -fuzztime=10s ./internal/encryption/ &
          wait

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, test]
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Integration tests
        run: go test -race -v -tags integration -count=1 -coverprofile=integration-coverage.out -covermode=atomic -coverpkg=./... ./internal/integration/

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: integration-coverage.out
          flags: integration
          token: ${{ secrets.CODECOV_TOKEN }}

  package:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [changes, lint, test]
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.packaging == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install lintian
        run: sudo apt-get update && sudo apt-get install -y lintian

      - name: Prep changelog
        run: make prep-changelog

      - name: Install syft (SBOM generation)
        uses: anchore/sbom-action/download-syft@v0

      - name: Build debs
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --snapshot --clean --skip=publish

      - name: Lint debs
        run: |
          for f in dist/*.deb; do echo "--- $f ---"; lintian --tag-display-limit 0 "$f"; done

  # ---------------------------------------------------------------------------
  # DOCKER IMAGES (push to main only)
  # ---------------------------------------------------------------------------
  docker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes, lint, test, integration]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Read version
        id: version
        run: echo "version=$(cat .version)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          pull: true
          push: true
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/afreidah/s3-orchestrator:${{ steps.version.outputs.version }}
            ghcr.io/afreidah/s3-orchestrator:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/afreidah/s3-orchestrator:${{ steps.version.outputs.version }}
          exit-code: 1
          severity: CRITICAL,HIGH

  docker-webpage:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [changes]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Read version
        id: version
        run: echo "version=$(cat .version)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: web/Dockerfile
          platforms: linux/amd64,linux/arm64
          pull: true
          push: true
          tags: |
            ghcr.io/afreidah/s3-orchestrator-webpage:${{ steps.version.outputs.version }}
            ghcr.io/afreidah/s3-orchestrator-webpage:latest
          cache-from: type=gha,scope=webpage-v2
          cache-to: type=gha,mode=max,scope=webpage-v2

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/afreidah/s3-orchestrator-webpage:${{ steps.version.outputs.version }}
          exit-code: 1
          severity: CRITICAL,HIGH
