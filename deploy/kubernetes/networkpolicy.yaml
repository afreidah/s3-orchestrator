# -------------------------------------------------------------------------------
# S3 Orchestrator - Network Policy
#
# Author: Alex Freidah
#
# Restricts ingress to port 9000 (S3 API + dashboard). Egress is left open
# because backend S3 endpoints, PostgreSQL, and tracing collectors are
# config-driven and may reside anywhere. Tighten egress per environment.
# -------------------------------------------------------------------------------

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: s3-orchestrator
  namespace: s3-orchestrator
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: s3-orchestrator
  policyTypes: [Ingress, Egress]
  ingress:
    - ports:
        - port: 9000
          protocol: TCP
  egress:
    - {} # Allow all egress — tighten per environment
