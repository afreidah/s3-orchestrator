server:
  listen_addr: "0.0.0.0:9000"
  backend_timeout: "30s"

database:
  host: "172.17.0.1"
  port: 15432
  database: "s3proxy_test"
  user: "s3proxy"
  password: "s3proxy"
  ssl_mode: "disable"

buckets:
  - name: "photos"
    credentials:
      - access_key_id: "photoskey"
        secret_access_key: "photossecret"

backends:
  - name: "minio-1"
    endpoint: "http://172.17.0.1:19000"
    region: "us-east-1"
    bucket: "backend1"
    access_key_id: "minioadmin"
    secret_access_key: "minioadmin"
    force_path_style: true
    unsigned_payload: true
    quota_bytes: 10737418240

  - name: "minio-2"
    endpoint: "http://172.17.0.1:19002"
    region: "us-east-1"
    bucket: "backend2"
    access_key_id: "minioadmin"
    secret_access_key: "minioadmin"
    force_path_style: true
    unsigned_payload: true
    quota_bytes: 10737418240

routing_strategy: "spread"

replication:
  factor: 2
  worker_interval: "10s"
  batch_size: 400

encryption:
  enabled: true
  master_key: "F2rpnHM7TmwJ4/DalNfk0cvCCPmHTfvB9LyhBLPoCVc="

circuit_breaker:
  failure_threshold: 3
  open_timeout: "15s"
  cache_ttl: "60s"

backend_circuit_breaker:
  enabled: true
  failure_threshold: 3
  open_timeout: "15s"

telemetry:
  metrics:
    enabled: true
  tracing:
    enabled: true
    endpoint: "172.17.0.1:4317"
    insecure: true

ui:
  enabled: true
  admin_key: "admin"
  admin_secret: "admin"
  admin_token: "admin" # Separate token for admin API (defaults to admin_key)
  # force_secure_cookies: false        # Local dev — no TLS proxy
