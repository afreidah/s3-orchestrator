# -------------------------------------------------------------------------------
# S3 Orchestrator - Sample Configuration
#
# Author: Alex Freidah
#
# Reference configuration with all available options. Values use ${VAR} syntax
# for environment variable expansion. Set variables in /etc/default/s3-orchestrator
# or export them before starting the service.
# -------------------------------------------------------------------------------

# --- HTTP server settings ---
server:
  listen_addr: ":9000"
  # max_object_size: 5368709120   # 5 GB (default)
  # max_concurrent_requests: 1000 # Max concurrent S3 requests (default: 1000)
  # backend_timeout: 30s          # Per-operation timeout for backend S3 calls

  # --- TLS (omit both cert_file and key_file for plain HTTP) ---
  # Certificates are hot-reloaded on SIGHUP without dropping connections.
  # tls:
  #   cert_file: "/etc/s3-orchestrator/tls/cert.pem"
  #   key_file: "/etc/s3-orchestrator/tls/key.pem"
  #   min_version: "1.2"           # "1.2" (default) or "1.3"
  #   client_ca_file: ""           # CA bundle for mTLS client verification

# --- PostgreSQL connection ---
database:
  host: ${DB_HOST}
  port: ${DB_PORT}
  database: ${DB_NAME}
  user: ${DB_USER}
  password: ${DB_PASSWORD}
  ssl_mode: ${DB_SSL_MODE}
  # max_conns: 50
  # min_conns: 5
  # max_conn_lifetime: 5m

# --- Virtual buckets exposed to clients ---
buckets:
  - name: default
    # max_multipart_uploads: 100  # optional; limit active multipart uploads (0 = unlimited)
    credentials:
      - access_key_id: ${BUCKET_ACCESS_KEY}
        secret_access_key: ${BUCKET_SECRET_KEY}

# --- Storage backends ---
backends:
  - name: ${BACKEND1_NAME}
    endpoint: ${BACKEND1_ENDPOINT}
    region: ${BACKEND1_REGION}
    bucket: ${BACKEND1_BUCKET}
    access_key_id: ${BACKEND1_ACCESS_KEY}
    secret_access_key: ${BACKEND1_SECRET_KEY}
    # force_path_style: false
    # unsigned_payload: true       # Stream uploads without buffering (auto-enabled for HTTPS, set explicitly for HTTP)
    # quota_bytes: 0               # 0 = unlimited
    # api_request_limit: 0         # Monthly API request cap (0 = unlimited)
    # egress_byte_limit: 0         # Monthly egress cap (0 = unlimited)
    # ingress_byte_limit: 0        # Monthly ingress cap (0 = unlimited)

# --- Object routing ---
# routing_strategy: pack          # "pack" fills backends sequentially, "spread" distributes evenly

# --- Server-side encryption (disabled by default) ---
# Envelope encryption with chunked AES-256-GCM. Each object gets a random
# 256-bit DEK wrapped by the master key. Exactly one key source is required.
# encryption:
#   enabled: true
#   chunk_size: 65536              # 4KB–1MB, power of 2 (default: 64KB)
#
#   # Option 1: inline key (base64-encoded 32-byte key)
#   master_key: "${ENCRYPTION_KEY}"
#
#   # Option 2: key file (raw 32 bytes)
#   # master_key_file: "/etc/s3-orchestrator/encryption.key"
#
#   # Option 3: Vault Transit
#   # vault:
#   #   address: "https://vault.service.consul:8200"
#   #   token: "${VAULT_TOKEN}"
#   #   key_name: "s3-orchestrator"
#   #   mount_path: "transit"
#
#   # Previous keys for rotation (unwrap only)
#   # previous_keys:
#   #   - "${OLD_ENCRYPTION_KEY}"

# --- Integrity verification (disabled by default) ---
# SHA-256 content hashing for data integrity. When enabled, objects are
# checksummed on write and optionally verified on read. The background
# scrubber periodically re-reads stored objects to detect silent corruption.
# integrity:
#   enabled: false
#   verify_on_read: false            # Hash-check every GET response (streams through VerifyingReader)
#   verify_on_replicate: true        # Verify hash when creating replicas (default: true when enabled)
#   scrubber_interval: 6h            # Background verification interval (0 = disabled)
#   scrubber_batch_size: 100         # Objects per scrub cycle

# --- Redis shared counters (disabled by default) ---
# When multiple instances share a PostgreSQL database, Redis provides shared
# usage counters so all instances see the same accumulated deltas between
# PG flushes. Without Redis each instance tracks its own counters independently.
# redis:
#   address: ${REDIS_ADDRESS}       # host:port (required when section is present)
#   password: ${REDIS_PASSWORD}     # AUTH password (omit for no auth)
#   db: 0
#   tls: false
#   key_prefix: "s3orch"            # Namespace for Redis keys
#   failure_threshold: 3            # Consecutive failures before fallback to local counters
#   open_timeout: 15s               # Delay before probing Redis recovery

# --- Background rebalancer (disabled by default) ---
# rebalance:
#   enabled: false
#   strategy: pack                # "pack" or "spread"
#   interval: 6h
#   batch_size: 100
#   threshold: 0.1               # Min utilization spread to trigger

# --- Cross-backend replication (disabled when factor=1) ---
# replication:
#   factor: 1                    # Number of copies per object
#   worker_interval: 5m
#   batch_size: 50
#   unhealthy_threshold: 10m     # Grace period before replacing copies on circuit-broken backends

# --- Per-IP rate limiting (disabled by default) ---
# rate_limit:
#   enabled: false
#   requests_per_sec: 100
#   burst: 200
#   cleanup_interval: "1m"       # How often stale per-IP entries are evicted
#   cleanup_max_age: "5m"        # Entries not seen within this window are evicted
#   trusted_proxies: []          # CIDRs whose X-Forwarded-For is trusted

# --- Circuit breaker for database failures ---
# circuit_breaker:
#   failure_threshold: 3         # Consecutive failures before opening
#   open_timeout: 15s            # Delay before probing recovery
#   cache_ttl: 60s               # TTL for degraded-mode read cache

# --- Per-backend circuit breakers (disabled by default) ---
# Detects individual backend failures (expired credentials, provider outage)
# and stops routing traffic to the unhealthy backend until recovery.
# backend_circuit_breaker:
#   enabled: false
#   failure_threshold: 5         # Consecutive failures before opening (default: 5)
#   open_timeout: 5m             # Delay before probing recovery (default: 5m)

# --- Prometheus metrics ---
# telemetry:
#   metrics:
#     enabled: false
#     path: /metrics
#   tracing:
#     enabled: false
#     endpoint: ${TRACING_ENDPOINT}
#     sample_rate: 1.0
#     insecure: false

