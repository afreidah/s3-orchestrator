# -------------------------------------------------------------------------------
# S3 Orchestrator - Local Development Configuration
#
# Author: Alex Freidah
#
# Pre-configured for the docker-compose environment started by "make run".
# Connects to the local MinIO and PostgreSQL containers with no additional setup.
# -------------------------------------------------------------------------------

# --- HTTP server settings ---
server:
  listen_addr: "0.0.0.0:9000"

# --- Database (SQLite for local dev, no external dependencies) ---
database:
  driver: sqlite
  path: "dev-data.db"
  ssl_mode: "disable"
  # max_conns: 50             # default: 50; size to 2-3x max_concurrent_requests for production

# --- Virtual buckets exposed to clients ---
buckets:
  - name: "photos"
    # max_multipart_uploads: 100  # optional; limit active multipart uploads (0 = unlimited)
    credentials:
      - access_key_id: "photoskey"
        secret_access_key: "photossecret"

  - name: "documents"
    credentials:
      - access_key_id: "docskey"
        secret_access_key: "docssecret"

  - name: "backups"
    credentials:
      - access_key_id: "backupskey"
        secret_access_key: "backupssecret"

# --- Storage backends ---
backends:
  - name: "minio-1"
    endpoint: "http://localhost:19000"
    region: "us-east-1"
    bucket: "backend1"
    access_key_id: "minioadmin"
    secret_access_key: "minioadmin"
    force_path_style: true
    quota_bytes: 10737418240  # 10 GB

  - name: "minio-2"
    endpoint: "http://localhost:19002"
    region: "us-east-1"
    bucket: "backend2"
    access_key_id: "minioadmin"
    secret_access_key: "minioadmin"
    force_path_style: true
    quota_bytes: 10737418240  # 10 GB

  - name: "minio-3"
    endpoint: "http://localhost:19004"
    region: "us-east-1"
    bucket: "backend3"
    access_key_id: "minioadmin"
    secret_access_key: "minioadmin"
    force_path_style: true
    quota_bytes: 10737418240  # 10 GB

# --- Object routing ---
routing_strategy: "spread"

# --- Prometheus metrics ---
telemetry:
  metrics:
    enabled: true

# --- Web dashboard ---
ui:
  enabled: true
  admin_key: "admin"
  admin_secret: "admin"
  session_secret: "local-dev-session-key"
  # admin_token: "separate-token"     # Separate token for admin API (defaults to admin_key)
  # force_secure_cookies: true        # Always set Secure flag on cookies (use behind TLS proxy)

# --- Integrity verification (disabled by default) ---
# integrity:
#   enabled: true
#   verify_on_read: true             # Hash-check every GET response
#   scrubber_interval: "6h"          # Background verification interval (0 = disabled)
#   scrubber_batch_size: 100         # Objects per scrub cycle

# --- Object data cache (disabled by default) ---
# In-memory LRU cache for frequently read objects. Reduces backend API calls
# and egress by serving repeated reads from memory. Objects are cached after
# the first full GET and invalidated on write.
# cache:
#   enabled: false
#   max_size: "256MB"            # total cache capacity (default: 256MB)
#   max_object_size: "10MB"      # skip caching objects larger than this (default: 10MB)
#   ttl: 5m                      # cached entry lifetime (default: 5m)

# --- Per-backend circuit breakers ---
backend_circuit_breaker:
  enabled: true
  failure_threshold: 3
  open_timeout: "15s"
