# -------------------------------------------------------------------------------
# Codecov Configuration
#
# Author: Alex Freidah
#
# Excludes generated code, test utilities, and integration-only code from
# coverage reports.
# -------------------------------------------------------------------------------

ignore:
  - "cmd/"                            # process entry points, not unit-testable
  - "internal/testutil/"              # shared test mocks
  - "internal/store/sqlc/"            # generated code (sqlc)
  - "internal/backend/backendtest/"   # generated mock (mockgen)
  - "internal/counter/redis.go"       # Redis counter backend, integration-tested only
  - "internal/encryption/vault.go"    # Vault transit integration, requires running Vault
