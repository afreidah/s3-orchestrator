# -------------------------------------------------------------------------------
# golangci-lint Configuration
#
# Author: Alex Freidah
#
# Linter settings for static analysis. Enables gocritic (diagnostic + performance
# tags) and misspell. Excludes generated sqlc code from analysis.
# -------------------------------------------------------------------------------

version: "2"
linters:
  enable:
    - bodyclose
    - copyloopvar
    - errcheck
    - gocritic
    - gosec
    - intrange
    - misspell
    - noctx
    - sloglint
    - staticcheck
  settings:
    gocritic:
      disabled-checks:
        - exitAfterDefer
      enabled-tags:
        - diagnostic
        - performance
    sloglint:
      context: "all"
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - internal/store/sqlc
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
